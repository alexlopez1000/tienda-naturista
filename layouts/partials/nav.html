<header>

    <a class="logo-link" href="/">
        <img class="logo" src="/images/logo-pagina.webp" alt="sntrlabs">
    </a>

    <div class="header-right">

        <nav id="menu">

            <a href="/" {{ if .IsHome }}class="nav-activo"{{ end }}>Inicio</a>

            <a href="/productos/" {{ if eq .Section "productos" }}class="nav-activo"{{ end }}>Productos</a>

            <a href="/nosotros/" {{ if eq .RelPermalink "/nosotros/" }}class="nav-activo"{{ end }}>Quiénes Somos</a>

            <a href="/contacto/" {{ if eq .RelPermalink "/contacto/" }}class="nav-activo"{{ end }}>Contacto</a>

        </nav>

        <button class="cart-toggle" onclick="toggleCart()" title="Ver carrito">
            🛒 <span id="cart-count">0</span>
        </button>

        <button class="menu-toggle" onclick="toggleMenu()">
            ☰
        </button>

    </div>

</header>
